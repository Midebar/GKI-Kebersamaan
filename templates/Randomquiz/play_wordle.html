{% extends 'Randomquiz/base.html' %}
{% load static %}
{% block title %}Scripture Word — Scripture Quest{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/play.css' %}">{% endblock %}

{% block content %}
<div class="play-wrap">
  <div class="play-header">
    <a href="{% url 'Randomquiz:quiz_home' %}" class="back-btn">← Back</a>
    <div class="play-mode-label">✝️ Scripture Word</div>
    <div class="score-pill">Score: <span id="score">0</span>/<span id="total">0</span></div>
  </div>

  <div class="card wordle-card" id="card">
    <div class="card-loading" id="loading">
      <div class="spinner"></div><p>Choosing the word…</p>
    </div>
    <div class="card-body" id="body" style="display:none">
      <div class="wordle-meta">
        <span class="wordle-cat" id="wordle-cat"></span>
        <span class="wordle-len" id="wordle-len"></span>
        <span class="wordle-att" id="wordle-att"></span>
      </div>
      <div class="hint-strip always-visible">
        <span class="hint-eye">💡</span> <span id="hint-text"></span>
      </div>
      <div class="hint-strip" id="hint2-strip" style="display:none">
        <span class="hint-eye">💡💡</span> <span id="hint2-text"></span>
      </div>
      <div id="wordle-grid"></div>
      <div id="wordle-keyboard"></div>
      <div class="wordle-input-row">
        <input id="wordle-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Type guess…">
        <button class="btn-primary small" onclick="submitGuess()">Enter</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="fun-fact-box" id="fun-fact" style="display:none"></div>
      <div class="card-controls" id="next-ctrl" style="display:none">
        <button class="btn-primary" onclick="loadQuestion()">Next Word →</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}<script src="{% static 'js/play_wordle.js' %}"></script>{% endblock %}
