{% extends 'Randomquiz/base.html' %}
{% load static %}
{% block title %}Reveal &amp; Guess — Scripture Quest{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/play.css' %}">{% endblock %}

{% block content %}
<div class="play-wrap">
  <div class="play-header">
    <a href="{% url 'Randomquiz:quiz_home' %}" class="back-btn">← Back</a>
    <div class="play-mode-label">🔍 Reveal &amp; Guess</div>
    <div class="score-pill">Score: <span id="score">0</span>/<span id="total">0</span></div>
  </div>

  <div class="card" id="card">
    <div class="card-loading" id="loading">
      <div class="spinner"></div><p>Preparing the image…</p>
    </div>
    <div class="card-body" id="body" style="display:none">
      <div class="image-arena">
        <canvas id="img-canvas"></canvas>
        <div class="reveal-overlay" id="reveal-overlay">
          <div class="fragment-grid" id="fragment-grid"></div>
        </div>
      </div>
      <div class="reveal-bar">
        <span class="reveal-label">Revealed: <span id="reveal-pct">0</span>%</span>
        <button class="btn-reveal" id="reveal-btn" onclick="revealMore()">
          Reveal More 🔍
        </button>
      </div>
      <div class="hint-strip" id="hint-strip" style="display:none">
        <span class="hint-eye">👁</span> <span id="hint-text"></span>
      </div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <div class="fun-fact-box" id="fun-fact" style="display:none"></div>
      <div class="card-controls">
        <button class="btn-primary" id="next-btn" onclick="loadQuestion()" style="display:none">Next Image →</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}<script src="{% static 'js/play_image.js' %}"></script>{% endblock %}
